<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devlin English Study Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        
        /* Flashcard Animation */
        .flashcard {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }

        .topic-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24">

    <div id="app">
        <!-- Header -->
        <header class="bg-indigo-600 text-white p-6 rounded-b-[2.5rem] shadow-xl sticky top-0 z-50">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-5">
                    <h1 class="text-2xl font-bold flex items-center gap-2">
                        <span>🚀</span> Devlin Pro Hub
                    </h1>
                    <button onclick="toggleNoteModal()" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition-all">
                        <span>➕</span>
                    </button>
                </div>
                <div class="relative">
                    <input id="searchInput" type="text" placeholder="Tìm kiếm từ vựng hoặc câu mẫu..." 
                        class="w-full bg-indigo-500/30 border border-indigo-400/50 text-white placeholder-indigo-200 rounded-2xl py-4 pl-6 pr-4 focus:outline-none focus:ring-2 focus:ring-white/20 transition-all">
                </div>
            </div>
        </header>

        <main id="mainContent" class="max-w-4xl mx-auto p-4 mt-4">
            <!-- Content will be injected here -->
        </main>

        <!-- Navigation Bar -->
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-xl border border-white/10 py-3 px-8 flex justify-around items-center gap-8 rounded-full shadow-2xl z-50 w-[92%] max-w-sm">
            <button onclick="changeTab('lessons')" id="nav-lessons" class="flex flex-col items-center gap-1 text-indigo-400 transition-all">
                <span class="text-xl">📚</span>
                <span class="text-[10px] font-bold uppercase">Bài học</span>
            </button>
            <button onclick="changeTab('flashcards')" id="nav-flashcards" class="flex flex-col items-center gap-1 text-slate-400 transition-all">
                <span class="text-xl">🎴</span>
                <span class="text-[10px] font-bold uppercase">Thẻ học</span>
            </button>
            <button onclick="changeTab('notes')" id="nav-notes" class="flex flex-col items-center gap-1 text-slate-400 transition-all">
                <span class="text-xl">📝</span>
                <span class="text-[10px] font-bold uppercase">Sổ tay</span>
            </button>
        </nav>
    </div>

    <!-- Note Modal -->
    <div id="noteModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="toggleNoteModal()"></div>
        <div class="relative bg-white w-full max-w-md rounded-[2rem] p-6 shadow-2xl animate-in zoom-in-95 duration-200">
            <h3 class="text-xl font-bold mb-4">Thêm vào Sổ tay</h3>
            <div class="space-y-4">
                <input id="noteWord" type="text" placeholder="Từ vựng/Câu mới..." class="w-full p-4 bg-slate-100 rounded-xl outline-none">
                <input id="noteMeaning" type="text" placeholder="Nghĩa tiếng Việt..." class="w-full p-4 bg-slate-100 rounded-xl outline-none">
                <textarea id="noteExample" placeholder="Ví dụ hoặc ghi chú thêm..." class="w-full p-4 bg-slate-100 rounded-xl outline-none h-24"></textarea>
                <div class="flex gap-2">
                    <button onclick="toggleNoteModal()" class="flex-1 py-3 font-bold text-slate-400">Hủy</button>
                    <button onclick="saveNote()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">Lưu lại</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cấu trúc 16 chủ đề chuẩn từ tài liệu
        const COURSE_DATA = [
            {
                id: 1, title: "Greetings & Introductions", icon: "👋",
                lessons: [
                    { vocab: "Hello/Hi", ipa: "/hǝ'loo/ /hai/", vietnamese: "Xin chào", sentence: "Hello, nice to meet you.", translate: "Chào bạn, rất vui được gặp bạn." },
                    { vocab: "Introduce", ipa: "/ɪn.trə'dus/", vietnamese: "Giới thiệu", sentence: "Allow me to introduce myself.", translate: "Cho phép tôi tự giới thiệu bản thân." },
                    { vocab: "Pleasure", ipa: "/'plez.ǝr/", vietnamese: "Hân hạnh", sentence: "It's a pleasure to meet you.", translate: "Thật là hân hạnh khi được gặp bạn." }
                ]
            },
            {
                id: 2, title: "Family & Relations", icon: "🏠",
                lessons: [
                    { vocab: "Family", ipa: "/'fæm.əl.i/", vietnamese: "Gia đình", sentence: "There are four people in my family.", translate: "Gia đình tôi có bốn người." },
                    { vocab: "Sibling", ipa: "/'sɪb.lɪŋ/", vietnamese: "Anh chị em ruột", sentence: "I have one younger brother.", translate: "Tôi có một em trai." }
                ]
            },
            {
                id: 3, title: "Tech & Internet", icon: "💻",
                lessons: [
                    { vocab: "Social media", ipa: "/'soʊ.ʃəl 'miː.di.ə/", vietnamese: "Mạng xã hội", sentence: "I'm active on Facebook and Instagram.", translate: "Tôi hoạt động trên Facebook và Instagram." },
                    { vocab: "Online shopping", ipa: "/'ɑːn.laɪn 'ʃɑː.pɪŋ/", vietnamese: "Mua sắm trực tuyến", sentence: "I love online shopping on Shopee.", translate: "Tôi thích mua sắm trực tuyến trên Shopee." }
                ]
            },
            {
                id: 4, title: "Daily Routines", icon: "⏰",
                lessons: [
                    { vocab: "Wake up", ipa: "/weɪk ʌp/", vietnamese: "Thức dậy", sentence: "I usually wake up at 6 AM.", translate: "Tôi thường thức dậy lúc 6 giờ sáng." },
                    { vocab: "Have breakfast", ipa: "/hæv 'brekfəst/", vietnamese: "Ăn sáng", sentence: "I have breakfast before going to work.", translate: "Tôi ăn sáng trước khi đi làm." }
                ]
            },
            {
                id: 5, title: "Food & Drinks", icon: "🍔",
                lessons: [
                    { vocab: "Delicious", ipa: "/dɪ'lɪʃəs/", vietnamese: "Ngon miệng", sentence: "This Pho is very delicious.", translate: "Món phở này rất ngon." },
                    { vocab: "Beverage", ipa: "/'bevərɪdʒ/", vietnamese: "Đồ uống", sentence: "Coffee is my favorite beverage.", translate: "Cà phê là đồ uống yêu thích của tôi." }
                ]
            },
            {
                id: 6, title: "Hobbies & Interests", icon: "🎨",
                lessons: [
                    { vocab: "Hobby", ipa: "/'hɑːbi/", vietnamese: "Sở thích", sentence: "My hobby is playing guitar.", translate: "Sở thích của tôi là chơi đàn ghi-ta." },
                    { vocab: "Interest", ipa: "/'ɪntrest/", vietnamese: "Sự quan tâm", sentence: "I have an interest in photography.", translate: "Tôi có niềm đam mê với nhiếp ảnh." }
                ]
            },
            {
                id: 7, title: "Work & Careers", icon: "💼",
                lessons: [
                    { vocab: "Occupation", ipa: "/ˌɑːkju'peɪʃn/", vietnamese: "Nghề nghiệp", sentence: "What is your occupation?", translate: "Nghề nghiệp của bạn là gì?" },
                    { vocab: "Experience", ipa: "/ɪk'spɪəriəns/", vietnamese: "Kinh nghiệm", sentence: "I have 2 years of experience.", translate: "Tôi có 2 năm kinh nghiệm." }
                ]
            },
            {
                id: 8, title: "Travel & Vacations", icon: "✈️",
                lessons: [
                    { vocab: "Destination", ipa: "/ˌdestɪ'neɪʃn/", vietnamese: "Điểm đến", sentence: "Da Lat is a popular destination.", translate: "Đà Lạt là một điểm đến phổ biến." },
                    { vocab: "Sightseeing", ipa: "/'saɪtsiːɪŋ/", vietnamese: "Tham quan", sentence: "We went sightseeing in the city.", translate: "Chúng tôi đã đi tham quan trong thành phố." }
                ]
            },
            {
                id: 9, title: "Health & Fitness", icon: "🏃",
                lessons: [
                    { vocab: "Workout", ipa: "/'wɜːkaʊt/", vietnamese: "Tập luyện", sentence: "I do a workout every morning.", translate: "Tôi tập luyện mỗi sáng." },
                    { vocab: "Healthy", ipa: "/'helθi/", vietnamese: "Khỏe mạnh", sentence: "Eat vegetables to stay healthy.", translate: "Ăn rau để giữ sức khỏe." }
                ]
            },
            {
                id: 10, title: "Shopping & Fashion", icon: "🛍️",
                lessons: [
                    { vocab: "Discount", ipa: "/'dɪskaʊnt/", vietnamese: "Giảm giá", sentence: "Is there any discount for this?", translate: "Cái này có giảm giá không?" },
                    { vocab: "Outfit", ipa: "/'aʊtfɪt/", vietnamese: "Bộ đồ", sentence: "I like your outfit today.", translate: "Tôi thích bộ đồ hôm nay của bạn." }
                ]
            },
            {
                id: 11, title: "Education & Learning", icon: "🎓",
                lessons: [
                    { vocab: "Knowledge", ipa: "/'nɑːlɪdʒ/", vietnamese: "Kiến thức", sentence: "Learning gives us knowledge.", translate: "Học tập mang lại kiến thức." },
                    { vocab: "Skill", ipa: "/skɪl/", vietnamese: "Kỹ năng", sentence: "English is a vital skill.", translate: "Tiếng Anh là một kỹ năng quan trọng." }
                ]
            },
            {
                id: 12, title: "Entertainment & Media", icon: "🎬",
                lessons: [
                    { vocab: "Movie", ipa: "/'muːvi/", vietnamese: "Phim ảnh", sentence: "I watch movies on weekends.", translate: "Tôi xem phim vào cuối tuần." },
                    { vocab: "Stream", ipa: "/striːm/", vietnamese: "Phát trực tuyến", sentence: "I stream music every day.", translate: "Tôi nghe nhạc trực tuyến mỗi ngày." }
                ]
            },
            {
                id: 13, title: "Socializing & Events", icon: "🥂",
                lessons: [
                    { vocab: "Invitation", ipa: "/ˌɪnvɪ'teɪʃn/", vietnamese: "Lời mời", sentence: "Thanks for the invitation.", translate: "Cảm ơn vì lời mời." },
                    { vocab: "Gathering", ipa: "/'ɡæðərɪŋ/", vietnamese: "Cuộc tụ họp", sentence: "It's a small family gathering.", translate: "Đó là một buổi tụ họp gia đình nhỏ." }
                ]
            },
            {
                id: 14, title: "Environment & Nature", icon: "🌿",
                lessons: [
                    { vocab: "Nature", ipa: "/'neɪtʃər/", vietnamese: "Thiên nhiên", sentence: "I love being close to nature.", translate: "Tôi thích được gần gũi với thiên nhiên." },
                    { vocab: "Recycle", ipa: "/ˌriː'saɪkl/", vietnamese: "Tái chế", sentence: "We should recycle plastic.", translate: "Chúng ta nên tái chế nhựa." }
                ]
            },
            {
                id: 15, title: "Weather & Seasons", icon: "🌤️",
                lessons: [
                    { vocab: "Sunny", ipa: "/'sʌni/", vietnamese: "Có nắng", sentence: "It's a sunny day today.", translate: "Hôm nay là một ngày nắng." },
                    { vocab: "Forecast", ipa: "/'fɔːrkæst/", vietnamese: "Dự báo", sentence: "Check the weather forecast.", translate: "Kiểm tra dự báo thời tiết." }
                ]
            },
            {
                id: 16, title: "Feelings & Emotions", icon: "😊",
                lessons: [
                    { vocab: "Excited", ipa: "/ɪk'saɪtɪd/", vietnamese: "Hào hứng", sentence: "I'm excited about the trip.", translate: "Tôi hào hứng về chuyến đi." },
                    { vocab: "Nervous", ipa: "/'nɜːrvəs/", vietnamese: "Lo lắng", sentence: "I feel a bit nervous.", translate: "Tôi cảm thấy hơi lo lắng." }
                ]
            }
        ];

        let currentTab = 'lessons';
        let selectedTopicId = null;
        let userNotes = JSON.parse(localStorage.getItem('devlin_notes')) || [];
        let currentFlashcardIndex = 0;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        function changeTab(tab) {
            currentTab = tab;
            selectedTopicId = null;
            
            ['lessons', 'flashcards', 'notes'].forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if (t === tab) {
                    btn.classList.add('text-indigo-400');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('text-indigo-400');
                    btn.classList.add('text-slate-400');
                }
            });
            render();
        }

        function selectTopic(id) {
            selectedTopicId = id;
            render();
            window.scrollTo(0, 0);
        }

        function toggleNoteModal() {
            const modal = document.getElementById('noteModal');
            modal.classList.toggle('hidden');
        }

        function saveNote() {
            const word = document.getElementById('noteWord').value;
            const meaning = document.getElementById('noteMeaning').value;
            const example = document.getElementById('noteExample').value;

            if (!word || !meaning) return;

            const newNote = { id: Date.now(), word, meaning, example };
            userNotes.unshift(newNote);
            localStorage.setItem('devlin_notes', JSON.stringify(userNotes));
            
            document.getElementById('noteWord').value = '';
            document.getElementById('noteMeaning').value = '';
            document.getElementById('noteExample').value = '';
            
            toggleNoteModal();
            if (currentTab === 'notes') render();
        }

        function deleteNote(id) {
            userNotes = userNotes.filter(n => n.id !== id);
            localStorage.setItem('devlin_notes', JSON.stringify(userNotes));
            render();
        }

        function render() {
            const main = document.getElementById('mainContent');
            
            if (currentTab === 'lessons') {
                if (selectedTopicId === null) {
                    main.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in duration-500">
                            <h2 class="col-span-full text-xl font-black px-2 mb-2 text-slate-400 uppercase tracking-widest text-xs">16 Chủ đề giao tiếp</h2>
                            ${COURSE_DATA.map(cat => `
                                <div onclick="selectTopic(${cat.id})" class="topic-card group bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center justify-between cursor-pointer hover:border-indigo-300 transition-all">
                                    <div class="flex items-center gap-5">
                                        <div class="w-14 h-14 bg-indigo-50 flex items-center justify-center text-2xl rounded-[1.2rem] group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                            ${cat.icon}
                                        </div>
                                        <div>
                                            <h3 class="font-black text-slate-800 text-md leading-tight">${cat.title}</h3>
                                            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">${cat.lessons.length} vocabularies</p>
                                        </div>
                                    </div>
                                    <div class="text-slate-300 group-hover:text-indigo-600 transition-all">→</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    const cat = COURSE_DATA.find(c => c.id === selectedTopicId);
                    main.innerHTML = `
                        <div class="animate-in slide-in-from-right duration-300">
                            <button onclick="selectTopic(null)" class="mb-6 flex items-center gap-2 text-indigo-600 font-bold bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-100">
                                🔙 Quay lại
                            </button>
                            <div class="bg-indigo-600 text-white p-8 rounded-[3rem] mb-8 shadow-lg relative overflow-hidden">
                                <div class="relative z-10">
                                    <span class="text-4xl mb-4 block">${cat.icon}</span>
                                    <h2 class="text-3xl font-black mb-2">${cat.title}</h2>
                                    <p class="opacity-80 text-sm">Học trọn bộ từ vựng chủ đề ${cat.title}.</p>
                                </div>
                            </div>
                            <div class="space-y-4">
                                ${cat.lessons.map(l => `
                                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                        <div class="flex justify-between items-start mb-4">
                                            <div>
                                                <h4 class="font-black text-indigo-600 text-xl tracking-tight">${l.vocab}</h4>
                                                <p class="text-slate-400 text-sm font-medium font-mono">${l.ipa}</p>
                                            </div>
                                            <button onclick="speak('${l.vocab}')" class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center active:scale-90 transition-all">🔊</button>
                                        </div>
                                        <p class="font-bold text-slate-700 mb-4 bg-slate-50 inline-block px-4 py-1 rounded-full text-sm">${l.vietnamese}</p>
                                        <div class="bg-indigo-50/40 p-5 rounded-[1.8rem] border-l-4 border-indigo-600">
                                            <p class="font-bold text-indigo-900 leading-snug mb-1">"${l.sentence}"</p>
                                            <p class="text-slate-500 text-xs font-medium">${l.translate}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            } else if (currentTab === 'flashcards') {
                const allVocab = COURSE_DATA.flatMap(c => c.lessons);
                const item = allVocab[currentFlashcardIndex];
                main.innerHTML = `
                    <div class="max-w-md mx-auto py-6 animate-in zoom-in duration-300">
                        <div class="text-center mb-8">
                            <h2 class="text-sm font-black text-indigo-400 uppercase tracking-widest">Thẻ ghi nhớ</h2>
                            <p class="text-slate-400 text-xs font-bold mt-1">${currentFlashcardIndex + 1} / ${allVocab.length}</p>
                        </div>
                        
                        <div class="perspective-1000 w-full h-96" onclick="this.querySelector('.flashcard').classList.toggle('is-flipped')">
                            <div class="flashcard relative w-full h-full transform-style-3d shadow-2xl rounded-[3.5rem]">
                                <div class="absolute inset-0 bg-white flex flex-col items-center justify-center p-10 backface-hidden rounded-[3.5rem] border-2 border-indigo-50">
                                    <div class="text-indigo-600 text-4xl font-black mb-3 tracking-tighter">${item.vocab}</div>
                                    <div class="text-slate-400 text-lg font-medium opacity-60 italic mb-6">${item.ipa}</div>
                                    <button onclick="event.stopPropagation(); speak('${item.vocab}')" class="px-6 py-3 bg-indigo-50 rounded-2xl text-indigo-600 font-black text-sm flex items-center gap-2">🔊 Phát âm</button>
                                </div>
                                <div class="absolute inset-0 bg-indigo-600 text-white flex flex-col items-center justify-center p-10 rotate-y-180 backface-hidden rounded-[3.5rem]">
                                    <div class="text-3xl font-black mb-6 text-center">${item.vietnamese}</div>
                                    <p class="text-indigo-100 text-center italic leading-relaxed text-sm">"${item.sentence}"</p>
                                </div>
                            </div>
                        </div>

                        <div class="flex gap-4 mt-12">
                            <button onclick="prevCard()" class="flex-1 py-4 bg-white rounded-3xl font-black text-slate-400 shadow-sm border border-slate-100">Trước</button>
                            <button onclick="nextCard()" class="flex-1 py-4 bg-slate-900 text-white rounded-3xl font-black">Sau</button>
                        </div>
                    </div>
                `;
            } else if (currentTab === 'notes') {
                main.innerHTML = `
                    <div class="animate-in slide-in-from-bottom duration-500">
                        <div class="flex justify-between items-center mb-8 px-2">
                            <h2 class="text-2xl font-black tracking-tight">Sổ tay</h2>
                            <span class="bg-indigo-100 text-indigo-600 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-wider">${userNotes.length} từ</span>
                        </div>
                        ${userNotes.length === 0 ? `
                            <div class="bg-white border-4 border-dashed border-slate-100 rounded-[3rem] p-16 text-center">
                                <p class="text-slate-400 font-bold">Hãy thêm từ mới bằng dấu (+) nhé!</p>
                            </div>
                        ` : `
                            <div class="grid grid-cols-1 gap-4">
                                ${userNotes.map(n => `
                                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 relative group overflow-hidden">
                                        <button onclick="deleteNote(${n.id})" class="absolute top-6 right-6 w-8 h-8 flex items-center justify-center text-slate-300 hover:text-red-500 bg-slate-50 rounded-full">✕</button>
                                        <h3 class="text-2xl font-black text-slate-800 tracking-tight mb-1">${n.word}</h3>
                                        <p class="font-bold text-indigo-600 mb-4">${n.meaning}</p>
                                        ${n.example ? `<div class="bg-slate-50 p-4 rounded-[1.5rem] italic text-slate-500 text-sm">"${n.example}"</div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                `;
            }
        }

        function nextCard() {
            const allVocab = COURSE_DATA.flatMap(c => c.lessons);
            if (currentFlashcardIndex < allVocab.length - 1) {
                currentFlashcardIndex++;
                render();
            }
        }

        function prevCard() {
            if (currentFlashcardIndex > 0) {
                currentFlashcardIndex--;
                render();
            }
        }

        render();

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if (q === '') { render(); return; }
            const main = document.getElementById('mainContent');
            const allLessons = COURSE_DATA.flatMap(c => c.lessons);
            const filtered = allLessons.filter(l => l.vocab.toLowerCase().includes(q) || l.vietnamese.toLowerCase().includes(q));
            main.innerHTML = `
                <div class="animate-in fade-in">
                    <p class="text-sm font-black text-slate-400 mb-4 px-2 uppercase">Kết quả (${filtered.length})</p>
                    <div class="grid grid-cols-1 gap-3">
                        ${filtered.map(l => `
                            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-indigo-100 flex justify-between items-center">
                                <div>
                                    <p class="font-black text-indigo-600 text-lg">${l.vocab}</p>
                                    <p class="text-sm font-bold text-slate-500">${l.vietnamese}</p>
                                </div>
                                <button onclick="speak('${l.vocab}')" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl">🔊</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
