<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devlin English Everyday</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        
        .flashcard {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        
        .glass-nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-pulse { animation: pulse-soft 1.5s infinite; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 pb-32">

    <div id="app">
        <!-- Header -->
        <header class="bg-[#4F46E5] text-white p-6 rounded-b-[3rem] shadow-2xl sticky top-0 z-50">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <p class="text-indigo-200 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Học Tiếng Anh Mỗi Ngày</p>
                        <h1 class="text-2xl font-extrabold tracking-tight">Devlin English <span class="text-yellow-400">Everyday</span></h1>
                    </div>
                </div>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-indigo-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    <input id="searchInput" type="text" placeholder="Tìm kiếm từ vựng trong bài học..." 
                        class="w-full bg-white/10 border border-white/20 text-white placeholder-indigo-200 rounded-2xl py-4 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-white/30 transition-all outline-none">
                </div>
            </div>
        </header>

        <main id="mainContent" class="max-w-4xl mx-auto p-5 mt-4">
            <!-- Dynamic Content -->
        </main>

        <!-- Navigation -->
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 glass-nav border border-white/10 py-3 px-6 flex justify-around items-center gap-4 rounded-[2.5rem] shadow-2xl z-50 w-[94%] max-w-md">
            <button onclick="changeTab('lessons')" id="nav-lessons" class="flex flex-col items-center gap-1 text-indigo-400 flex-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="text-[9px] font-bold uppercase tracking-wider">Bài học</span>
            </button>
            <button onclick="changeTab('translate')" id="nav-translate" class="flex flex-col items-center gap-1 text-slate-400 flex-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
                <span class="text-[9px] font-bold uppercase tracking-wider">Dịch thuật</span>
            </button>
            <button onclick="changeTab('flashcards')" id="nav-flashcards" class="flex flex-col items-center gap-1 text-slate-400 flex-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                <span class="text-[9px] font-bold uppercase tracking-wider">Thẻ học</span>
            </button>
            <button onclick="changeTab('notes')" id="nav-notes" class="flex flex-col items-center gap-1 text-slate-400 flex-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                <span class="text-[9px] font-bold uppercase tracking-wider">Ghi chú</span>
            </button>
        </nav>
    </div>

    <!-- Modal thêm từ nhanh -->
    <div id="noteModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="toggleNoteModal()"></div>
        <div class="relative bg-white w-full max-w-md rounded-[3rem] p-8 shadow-2xl animate-in fade-in zoom-in duration-200">
            <h3 class="text-2xl font-extrabold mb-6">Thêm từ vựng</h3>
            <div class="space-y-4">
                <input id="noteWord" type="text" placeholder="Tiếng Anh..." class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-semibold">
                <input id="noteMeaning" type="text" placeholder="Nghĩa Tiếng Việt..." class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-semibold">
                <div class="flex gap-4 pt-2">
                    <button onclick="toggleNoteModal()" class="flex-1 py-4 font-bold text-slate-400">Hủy</button>
                    <button onclick="saveNote()" class="flex-1 py-4 bg-[#4F46E5] text-white rounded-2xl font-bold">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // API key được cung cấp bởi môi trường runtime
        
        const COURSE_DATA = [
            { id: 1, title: "Greetings & Introductions", icon: "👋", lessons: [
                { vocab: "Hello/Hi", ipa: "/hǝ'loo/ /hai/", vietnamese: "Xin chào", sentence: "Hello, nice to meet you.", translate: "Chào bạn, rất vui được gặp bạn." },
                { vocab: "Good morning", ipa: "/ɡʊd 'mɔːrnɪŋ/", vietnamese: "Chào buổi sáng", sentence: "Good morning! How are you today?", translate: "Chào buổi sáng! Hôm nay bạn thế nào?" },
                { vocab: "Introduce", ipa: "/ˌɪntrə'djuːs/", vietnamese: "Giới thiệu", sentence: "Allow me to introduce myself.", translate: "Cho phép tôi giới thiệu bản thân." },
                { vocab: "Pleasure", ipa: "/'pleʒər/", vietnamese: "Hân hạnh", sentence: "It's a pleasure to meet you.", translate: "Rất hân hạnh được gặp bạn." }
            ]},
            { id: 2, title: "Family & Personal", icon: "👨‍👩‍👧‍👦", lessons: [
                { vocab: "Family", ipa: "/'fæmili/", vietnamese: "Gia đình", sentence: "There are four people in my family.", translate: "Gia đình tôi có bốn người." },
                { vocab: "Sibling", ipa: "/'sɪblɪŋ/", vietnamese: "Anh chị em", sentence: "Do you have any siblings?", translate: "Bạn có anh chị em nào không?" }
            ]},
            { id: 3, title: "Tech & Internet", icon: "🌐", lessons: [
                { vocab: "Social media", ipa: "/'soʊʃl 'miːdiə/", vietnamese: "Mạng xã hội", sentence: "I'm active on Facebook and Instagram.", translate: "Tôi hoạt động trên Facebook và Instagram." },
                { vocab: "Research", ipa: "/rɪ'sɜːrtʃ/", vietnamese: "Nghiên cứu", sentence: "I use it for researching information.", translate: "Tôi dùng nó để tìm kiếm thông tin." }
            ]},
            { id: 4, title: "Daily Routines", icon: "⏰", lessons: [
                { vocab: "Wake up", ipa: "/weɪk ʌp/", vietnamese: "Thức dậy", sentence: "I usually wake up at 6 AM.", translate: "Tôi thường thức dậy lúc 6 giờ sáng." }
            ]},
            { id: 5, title: "Food & Drinks", icon: "🍜", lessons: [
                { vocab: "Delicious", ipa: "/dɪ'lɪʃəs/", vietnamese: "Ngon", sentence: "This food is so delicious!", translate: "Món này ngon quá!" }
            ]},
            { id: 6, title: "Hobbies & Interests", icon: "🎸", lessons: [
                { vocab: "Hobby", ipa: "/'hɑːbi/", vietnamese: "Sở thích", sentence: "My hobby is playing video games.", translate: "Sở thích của tôi là chơi game." }
            ]},
            { id: 7, title: "Work & Jobs", icon: "💼", lessons: [
                { vocab: "Occupation", ipa: "/ˌɑːkju'peɪʃn/", vietnamese: "Nghề nghiệp", sentence: "What is your occupation?", translate: "Nghề nghiệp của bạn là gì?" }
            ]},
            { id: 8, title: "Travel & Vacations", icon: "✈️", lessons: [
                { vocab: "Destination", ipa: "/ˌdestɪ'neɪʃn/", vietnamese: "Điểm đến", sentence: "Da Lat is my favorite destination.", translate: "Đà Lạt là điểm đến yêu thích của tôi." }
            ]},
            { id: 9, title: "Health & Fitness", icon: "💪", lessons: [
                { vocab: "Exercise", ipa: "/'eksərsaɪz/", vietnamese: "Tập thể dục", sentence: "I exercise every morning.", translate: "Tôi tập thể dục mỗi sáng." }
            ]},
            { id: 10, title: "Shopping", icon: "🛒", lessons: [
                { vocab: "Discount", ipa: "/'dɪskaʊnt/", vietnamese: "Giảm giá", sentence: "Is there a discount on this?", translate: "Cái này có giảm giá không?" }
            ]},
            { id: 11, title: "Education", icon: "🎓", lessons: [
                { vocab: "Knowledge", ipa: "/'nɑːlɪdʒ/", vietnamese: "Kiến thức", sentence: "Knowledge is power.", translate: "Kiến thức là sức mạnh." }
            ]},
            { id: 12, title: "Entertainment", icon: "🎬", lessons: [
                { vocab: "Movie", ipa: "/'muːvi/", vietnamese: "Phim", sentence: "I love watching action movies.", translate: "Tôi thích xem phim hành động." }
            ]},
            { id: 13, title: "Socializing", icon: "🥳", lessons: [
                { vocab: "Hang out", ipa: "/hæŋ aʊt/", vietnamese: "Đi chơi", sentence: "Let's hang out this weekend.", translate: "Cuối tuần này đi chơi đi." }
            ]},
            { id: 14, title: "Environment", icon: "🌍", lessons: [
                { vocab: "Recycle", ipa: "/ˌriː'saɪkl/", vietnamese: "Tái chế", sentence: "We should recycle more.", translate: "Chúng ta nên tái chế nhiều hơn." }
            ]},
            { id: 15, title: "Weather", icon: "🌦️", lessons: [
                { vocab: "Forecast", ipa: "/'fɔːrkæst/", vietnamese: "Dự báo", sentence: "Check the weather forecast.", translate: "Kiểm tra dự báo tiết tiết." }
            ]},
            { id: 16, title: "Feelings", icon: "🌈", lessons: [
                { vocab: "Excited", ipa: "/ɪk'saɪtɪd/", vietnamese: "Hào hứng", sentence: "I'm excited about the news.", translate: "Tôi rất hào hứng với tin tức này." }
            ]}
        ];

        let state = {
            tab: 'lessons',
            selectedTopic: null,
            notes: JSON.parse(localStorage.getItem('devlin_v2_notes')) || [],
            flashcardIdx: 0,
            translationInput: '',
            translationResult: '',
            isTranslating: false
        };

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        async function translateText() {
            const input = document.getElementById('translateArea').value.trim();
            if (!input) return;

            state.isTranslating = true;
            render();

            const systemPrompt = "Bạn là một chuyên gia ngôn ngữ Anh-Việt. Hãy dịch văn bản sau đây. Nếu là tiếng Anh, hãy dịch sang tiếng Việt. Nếu là tiếng Việt, hãy dịch sang tiếng Anh. Cung cấp bản dịch chính xác, tự nhiên và giải thích ngắn gọn ngữ pháp nếu cần.";
            
            try {
                let delay = 1000;
                let success = false;
                let resultText = "";

                for (let i = 0; i < 5; i++) {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: input }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Không có kết quả.";
                        success = true;
                        break;
                    }
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }

                if (!success) throw new Error("Retry failed");
                state.translationResult = resultText;
            } catch (err) {
                state.translationResult = "Lỗi kết nối. Vui lòng thử lại sau.";
            } finally {
                state.isTranslating = false;
                render();
            }
        }

        function changeTab(tab) {
            state.tab = tab;
            state.selectedTopic = null;
            render();
        }

        function selectTopic(id) {
            state.selectedTopic = id;
            render();
            window.scrollTo(0, 0);
        }

        function toggleNoteModal() {
            document.getElementById('noteModal').classList.toggle('hidden');
        }

        function saveNote() {
            const word = document.getElementById('noteWord').value;
            const meaning = document.getElementById('noteMeaning').value;
            if (!word || !meaning) return;
            state.notes.unshift({ id: Date.now(), word, meaning });
            localStorage.setItem('devlin_v2_notes', JSON.stringify(state.notes));
            document.getElementById('noteWord').value = '';
            document.getElementById('noteMeaning').value = '';
            toggleNoteModal();
            render();
        }

        function render() {
            const main = document.getElementById('mainContent');
            
            // Cập nhật trạng thái nav
            ['lessons', 'translate', 'flashcards', 'notes'].forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if (t === state.tab) {
                    btn.classList.replace('text-slate-400', 'text-indigo-400');
                } else {
                    btn.classList.replace('text-indigo-400', 'text-slate-400');
                }
            });

            if (state.tab === 'lessons') {
                if (!state.selectedTopic) {
                    main.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in duration-500">
                            <h2 class="col-span-full text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 px-2">16 Chủ Đề Giao Tiếp</h2>
                            ${COURSE_DATA.map(cat => `
                                <div onclick="selectTopic(${cat.id})" class="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center justify-between cursor-pointer active:scale-95 transition-all">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 bg-indigo-50 flex items-center justify-center text-xl rounded-2xl shadow-inner">
                                            ${cat.icon}
                                        </div>
                                        <div>
                                            <h3 class="font-bold text-slate-800 tracking-tight text-sm">${cat.title}</h3>
                                            <p class="text-[9px] text-slate-400 font-bold uppercase mt-0.5">${cat.lessons.length} vocabularies</p>
                                        </div>
                                    </div>
                                    <div class="text-slate-300">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    const cat = COURSE_DATA.find(c => c.id === state.selectedTopic);
                    main.innerHTML = `
                        <div class="animate-in slide-in-from-right duration-300">
                            <button onclick="selectTopic(null)" class="mb-6 flex items-center gap-2 text-indigo-600 font-bold bg-white px-4 py-2 rounded-xl shadow-sm text-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                                Quay lại
                            </button>
                            <div class="bg-indigo-600 text-white p-8 rounded-[3rem] mb-6 shadow-xl relative overflow-hidden">
                                <span class="text-3xl mb-2 block">${cat.icon}</span>
                                <h2 class="text-2xl font-extrabold tracking-tight">${cat.title}</h2>
                                <div class="absolute -right-8 -bottom-8 text-8xl opacity-10 rotate-12">${cat.icon}</div>
                            </div>
                            <div class="space-y-4">
                                ${cat.lessons.map(l => `
                                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                        <div class="flex justify-between items-start mb-4">
                                            <div onclick="speak('${l.vocab}')" class="cursor-pointer">
                                                <h4 class="font-extrabold text-indigo-600 text-xl tracking-tight">${l.vocab}</h4>
                                                <p class="text-slate-400 text-xs font-bold font-mono mt-1">${l.ipa}</p>
                                            </div>
                                            <button onclick="speak('${l.vocab}')" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center active:scale-90 transition-all">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                                            </button>
                                        </div>
                                        <p class="font-bold text-slate-800 mb-4 bg-slate-50 inline-block px-4 py-1.5 rounded-xl text-sm border border-slate-100">${l.vietnamese}</p>
                                        <div class="bg-indigo-50/40 p-5 rounded-[1.8rem] border-l-4 border-indigo-500">
                                            <p class="font-bold text-indigo-950 leading-tight mb-1">"${l.sentence}"</p>
                                            <p class="text-indigo-400 text-[10px] font-bold uppercase tracking-wider">${l.translate}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            } else if (state.tab === 'translate') {
                main.innerHTML = `
                    <div class="animate-in fade-in duration-500">
                        <div class="mb-8 px-2">
                            <h2 class="text-2xl font-black tracking-tight mb-1">Dịch thuật AI</h2>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Dịch Anh - Việt song phương</p>
                        </div>
                        
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 mb-6">
                            <textarea id="translateArea" class="w-full h-32 bg-slate-50 rounded-[1.5rem] p-5 outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium text-slate-700 mb-4" placeholder="Nhập văn bản cần dịch..."></textarea>
                            <button onclick="translateText()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-200 flex items-center justify-center gap-2 active:scale-[0.98] transition-all">
                                ${state.isTranslating ? '<span class="loading-pulse">Đang dịch...</span>' : 'Dịch ngay 🚀'}
                            </button>
                        </div>

                        ${state.translationResult ? `
                            <div class="bg-indigo-50 p-6 rounded-[2.5rem] border border-indigo-100 animate-in slide-in-from-bottom duration-300">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Kết quả bản dịch</span>
                                    <button onclick="speak(document.getElementById('resultText').innerText)" class="text-indigo-600 text-xs font-bold bg-white px-3 py-1 rounded-full shadow-sm">🔊 Nghe</button>
                                </div>
                                <div id="resultText" class="text-slate-800 font-medium leading-relaxed whitespace-pre-wrap">${state.translationResult}</div>
                            </div>
                        ` : `
                            <div class="p-10 text-center opacity-30">
                                <div class="text-5xl mb-4">📖</div>
                                <p class="text-xs font-bold uppercase tracking-widest">Nhập văn bản để bắt đầu</p>
                            </div>
                        `}
                    </div>
                `;
            } else if (state.tab === 'flashcards') {
                const all = COURSE_DATA.flatMap(c => c.lessons);
                const item = all[state.flashcardIdx];
                main.innerHTML = `
                    <div class="max-w-sm mx-auto py-6 animate-in zoom-in duration-300">
                        <div class="text-center mb-10">
                            <h2 class="text-slate-400 text-xs font-black uppercase tracking-[0.2em] mb-1">${state.flashcardIdx + 1} / ${all.length}</h2>
                        </div>
                        <div class="perspective-1000 w-full h-[380px] cursor-pointer" onclick="this.querySelector('.flashcard').classList.toggle('is-flipped')">
                            <div class="flashcard relative w-full h-full transform-style-3d shadow-xl rounded-[3.5rem]">
                                <div class="absolute inset-0 bg-white flex flex-col items-center justify-center p-8 backface-hidden rounded-[3.5rem] border-2 border-indigo-50">
                                    <div class="text-indigo-600 text-4xl font-black mb-2 tracking-tighter">${item.vocab}</div>
                                    <div class="text-slate-300 text-sm font-bold italic">${item.ipa}</div>
                                </div>
                                <div class="absolute inset-0 bg-indigo-600 text-white flex flex-col items-center justify-center p-8 rotate-y-180 backface-hidden rounded-[3.5rem]">
                                    <div class="text-2xl font-black mb-6 text-center leading-tight">${item.vietnamese}</div>
                                    <p class="text-indigo-100 text-center italic text-xs leading-relaxed">"${item.sentence}"</p>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-4 mt-12">
                            <button onclick="prevCard()" class="flex-1 py-4 bg-white rounded-[2rem] font-bold text-slate-400 shadow-sm border border-slate-100 active:scale-95 transition-all">Trước</button>
                            <button onclick="nextCard()" class="flex-1 py-4 bg-slate-900 text-white rounded-[2rem] font-bold active:scale-95 transition-all">Tiếp</button>
                        </div>
                    </div>
                `;
            } else if (state.tab === 'notes') {
                main.innerHTML = `
                    <div class="animate-in fade-in duration-500">
                        <div class="flex justify-between items-center mb-8 px-2">
                            <h2 class="text-2xl font-black tracking-tight">Ghi chú của tôi</h2>
                            <button onclick="toggleNoteModal()" class="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">➕</button>
                        </div>
                        ${state.notes.length === 0 ? `
                            <div class="bg-white border-2 border-dashed border-slate-100 rounded-[3rem] p-16 text-center">
                                <p class="text-slate-400 font-bold">Chưa có ghi chú nào!</p>
                            </div>
                        ` : `
                            <div class="grid grid-cols-1 gap-4">
                                ${state.notes.map(n => `
                                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-50 relative group">
                                        <button onclick="deleteNote(${n.id})" class="absolute top-6 right-6 text-slate-200 hover:text-red-500 transition-all">✕</button>
                                        <h3 class="text-xl font-black text-slate-800 mb-1">${n.word}</h3>
                                        <p class="font-bold text-indigo-600">${n.meaning}</p>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                `;
            }
        }

        function nextCard() {
            const all = COURSE_DATA.flatMap(c => c.lessons);
            if (state.flashcardIdx < all.length - 1) { state.flashcardIdx++; render(); }
        }

        function prevCard() {
            if (state.flashcardIdx > 0) { state.flashcardIdx--; render(); }
        }

        function deleteNote(id) {
            state.notes = state.notes.filter(n => n.id !== id);
            localStorage.setItem('devlin_v2_notes', JSON.stringify(state.notes));
            render();
        }

        document.addEventListener('DOMContentLoaded', () => {
            render();
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const q = e.target.value.toLowerCase();
                if (!q) { render(); return; }
                const all = COURSE_DATA.flatMap(c => c.lessons);
                const results = all.filter(l => l.vocab.toLowerCase().includes(q) || l.vietnamese.toLowerCase().includes(q));
                
                document.getElementById('mainContent').innerHTML = `
                    <div class="animate-in fade-in">
                        <p class="text-[10px] font-black text-slate-400 mb-4 px-2 uppercase tracking-widest">Kết quả tìm kiếm (${results.length})</p>
                        <div class="grid gap-3">
                            ${results.map(l => `
                                <div onclick="speak('${l.vocab}')" class="bg-white p-5 rounded-[1.8rem] shadow-sm border border-indigo-50 flex justify-between items-center cursor-pointer">
                                    <div>
                                        <p class="font-black text-indigo-600 text-md">${l.vocab}</p>
                                        <p class="text-[10px] font-bold text-slate-400">${l.vietnamese}</p>
                                    </div>
                                    <div class="w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-600 text-xs">🔊</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
